# Bug Finder Agent QLoRA 训练配置
# 模型：Qwen2.5-Coder-1.5B-Instruct
# 任务：代码错误分类 + 根因定位 + 修复建议生成
# 硬件：RTX 4060 8GB

model:
  name_or_path: "Qwen/Qwen2.5-Coder-1.5B-Instruct"
  quantization_bit: 4
  max_length: 2048

lora:
  finetuning_type: "lora"
  rank: 32
  alpha: 64
  target: ["q_proj", "v_proj", "k_proj", "o_proj"]
  dropout: 0.05

training:
  dataset: "bug_finder_sft"
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  num_train_epochs: 3
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  fp16: true
  logging_steps: 10
  save_steps: 100
  eval_steps: 100
  output_dir: "ml/checkpoints/bug_finder"
  seed: 42

data:
  train_file: "ml/collected_data/bug_finder_train.json"
  eval_file: "ml/collected_data/bug_finder_eval.json"
  max_samples: 800

evaluation:
  metrics:
    - error_type_accuracy
    - location_accuracy
    - fix_success_rate
    - latency
  targets:
    error_type_accuracy: 0.85
    location_accuracy: 0.75
    fix_success_rate: 0.60
    latency_ms: 200
